<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
      outline: none;
    }

    div.form-control {
      background: #e8e8e8;
    }

    main {
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    h3 {
      font-size: 2rem;
    }

    div.links {
      margin-bottom: 1rem;
    }

    div.links a {
      text-decoration: none;
      color: #000;
    }

    div.links a:hover {
      text-decoration: underline;
    }

    form {
      display: grid;
      gap: 2rem;
    }

    form > div {
      display: grid;
      gap: 2rem;
    }

    form > div > div {
      display: grid;
      gap: 1rem;
    }

    div.form-control {
      display: grid;
      padding: .5rem 1rem;
      width: 100%;
      border-radius: .6rem;
    }

    div.form-control label {
      color: #333;
      font-weight: 800;
      text-transform: capitalize;
      font-size: 0.925rem;
    }

    div.row {
      display: flex;
      gap: 2rem;
    }

    div.form-control input,
    div.form-control textarea {
      background: transparent;
      resize: none;
      border: 0;
      font-size: 1.2rem;
      margin-bottom: .5rem;
    }

    div.form-control input {
      padding-top: 10px;
    }

    div.buttons-container {
      display: flex;
      gap: 1rem;
    }

    div.buttons-container > * {
      padding: 1rem;
      background: gray;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      border: none;
      text-decoration: none;
      cursor: pointer;
    }

    div.buttons-container button {
      background: dodgerblue;
      opacity: .7;
      transition: .5s;
    }

    div.buttons-container button:hover {
      opacity: 1;
    }

    div.buttons-container a {
      background: transparent;
      color: #000;
    }
  </style>
</head>
<body>

  <main>
    <div class="links">
      <a href="/">Página inicial</a>
      >
      <a href="/" style="color: dodgerblue;">Atualizar dados</a>
    </div>
    <form action="/cliente/{{id}}/update" method="POST" autocomplete="off">
      <input type="hidden" name="_method" value="put">
      <div class="clients">
        <h3>Dados do cliente</h3>
        <div class="row">
          <div class="form-control">
            <label for="client">cliente</label>
            <input type="text" name="client" id="client" placeholder="{{name}}" autofocus>
          </div>

          <div class="form-control">
            <label for="contact">contato</label>
            <input type="text" name="contact" placeholder="{{contact}}" id="contact">
          </div>
        </div>
      </div>
      <div class="cars">
        <h3>Dados do veículo</h3>
        <div class="row">
          <div class="form-control">
            <label for="brand">marca</label>
            <input type="text" name="brand" placeholder="{{brand}}" id="brand">
          </div>
          <div class="form-control">
            <label for="model">modelo</label>
            <input type="text" name="model" placeholder="{{model}}" id="model">
          </div>
        </div>
        <div class="row">
          <div class="form-control">
            <label for="year">ano</label>
            <input type="text" name="year" placeholder="{{year}}" id="year">
          </div>
          <div class="form-control">
            <label for="plate">placa</label>
            <input type="text" name="plate" placeholder="{{plate}}" id="plate">
          </div>
        </div>
        <div class="form-control">
          <label for="problem">Defeito</label>
          <textarea name="problem" id="problem" placeholder="{{problem}}" rows="7"></textarea>
        </div>
      </div>
      <div class="services">
        <h3>Reparos necessários</h3>
        <div class="form-control">
          <label for="changes">Peças a serem substituídas</label>
          <textarea name="changes" id="changes" placeholder="{{service}}" rows="7"></textarea>
        </div>
        <div class="row">
          <div class="form-control">
            <label for="price">preço do serviço</label>
            <input type="text" name="price" placeholder="{{price}}" id="price">
          </div>
          <div class="form-control">
            <label for="service_date">Data do serviço</label>
            <input type="text" name="service_date" placeholder="{{date}}" id="service_date">
          </div>
        </div>
      </div>
      <div class="buttons-container">
        <button type="submit">Salvar alterações</button>
        <a href="/">Cancelar</button>
      </div>
    </form>
  </main>
  
</body>
</html>
