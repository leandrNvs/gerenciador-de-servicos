<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      outline: none;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: #F5F5F5;
    }

    main {
      margin: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    form.search {
      margin-bottom: 1rem;
    }

    form.search input {
      border: 1px solid #ffff;
      box-shadow: 0 0 10px rgba(0,0,0,.1);
      font-size: 1rem;
      width: 100%;
      max-width: 500px;
      padding: 15px;
      border-radius: 1.5rem;
      padding-left: 40px;
      background: #fff url('/assets/images/search.svg') no-repeat 4% 50%;
    }

    button {
      font-size: 1.1rem;
      color: #fff;
      padding: 1rem;
      background: dodgerblue;
      font-weight: bold;
      border: none;
      align-self: self-end;
      box-shadow: 0 0 10px rgba(0,0,0,.1);
      opacity: 0.7;
      cursor: pointer;
      transition: .3s;
      display: flex;
      gap: .5rem;
      align-items: center;
    }

    button:hover {
      opacity: 1;
    }

    table {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 0 10px rgba(0,0,0,.1);
      width: 100%;
      border-collapse: collapse;
    }

    th {
      color: #222;
      padding: 1rem;
      text-align: left;
      cursor: pointer;
    }

    th span {
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    tr {
      border-bottom: 1px solid #ddd;
    }

    td {
      padding: .8rem 1rem;
    }

    tbody tr:hover {
      background: #F0F0F0;
    }

    div.overlay {
      background: rgba(0, 0, 0, .8);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      
      padding: 4rem;

      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      
      overflow-y: auto;

    }

    div.overlay.active {
      display: grid;
    }

    div.overlay > div h3 {
      width: 100%;
      padding: .5rem;
      background: gray;
      text-align: center;
      color: #fff;
    }

    div.clients {
      margin-bottom: 2rem;
    }

    div.overlay form {
      background: #fff;
      display: grid;
      gap: 2rem;
      padding: 3rem;
    }

    div.row {
      display: flex;
      gap: 2rem;
      width: 100%;
    }

    div.form-control {
      position: relative;
      flex: 1;
    }

    div.form-control input {
      border: 1px solid gray;
      font-size: 1.3rem;
      padding: 10px;
      width: 100%;
      padding-left: 20px;
    }

    div.form-control textarea {
      border: 1px solid gray;
      font-size: 1.3rem;
      padding: 10px;
      width: 100%;
      resize: none;
    }

    div.form-control input:focus {
      border-color: dodgerblue;
      outline: 2px solid dodgerblue;
    }

    div.form-control textarea:focus {
      border-color: dodgerblue;
      outline: 2px solid dodgerblue;
    }
    
    div.form-control label {
      background: #fff;
      position: absolute;
      top: -10px;
      left: 10px;
      padding: 0 1rem ;
      text-transform: capitalize;
    }

    div.buttons {
      display: flex;
      gap: 1rem;
    }

    div.buttons button {
      opacity: 1;
      font-size: 1rem;
      border-radius: 0;
      background: grey;
    }

    div.buttons button:first-child:hover {
      background: green;
    }

    div.buttons button:last-child:hover {
      background: red;
    }

    div.parts form button {
      border-radius: 0;
      opacity: 1;
      background: green;
      justify-self: start;
    }

    div.menu {
      background: #fff;
      border-radius: .6rem;
      display: none;
      width: fit-content;
      box-shadow: 0 0 10px rgba(0, 0, 0, .2);
      border: 1px solid #ddd;
      position: absolute;
    }

    div.menu a {
      padding: 1rem;
      text-decoration: none;
      color: #222;
      font-weight: 700;
      border-bottom: 1px solid #ddd;
    }

    div.menu a:hover {
      background: #eee;
    }

    .error {
      outline: 2px solid red;
      border: 1px solid red;
    }
  </style>
</head>
<body>

  <div class="overlay">
    <div class="forms-group">
      <div class="clients">
        <h3>Cliente</h3>
        <form action="" class="client" autocomplete="off">
          <div class="form-control">
            <label for="client">cliente</label>
            <input type="text" name="client" id="client">
          </div>

          <div class="form-control">
            <label for="contact">contato</label>
            <input type="text" name="contact" id="contatc">
          </div>
        </form>
      </div>
      <div class="cars">
        <h3>Carro</h3>
        <form action="" class="car" autocomplete="off">
          <div class="row">
            <div class="form-control">
              <label for="brand">marca</label>
              <input type="text" name="brand" id="brand">
            </div>
            <div class="form-control">
              <label for="model">modelo</label>
              <input type="text" name="model" id="model">
            </div>
          </div>
          <div class="row">
            <div class="form-control">
              <label for="year">ano</label>
              <input type="text" name="year" id="year">
            </div>
            <div class="form-control">
              <label for="plate">placa</label>
              <input type="text" name="plate" id="plate">
            </div>
          </div>
          <div class="form-control">
            <label for="problem">Defeito</label>
            <textarea name="problem" id="problem" rows="7"></textarea>
          </div>
        </form>
      </div>
    </div>
    <div class="services">
      <h3>Serviço</h3>
      <form action="" class="service" autocomplete="off">
        <div class="form-control">
          <label for="changes">Peças a serem substituídas</label>
          <textarea name="changes" id="changes" rows="7"></textarea>
        </div>
        <div class="form-control">
          <label for="price">preço do serviço</label>
          <input type="text" name="price" id="price">
        </div>
      </form>
    </div>

    <div class="buttons">
      <button class="submitButton">Concluir cadastro</button>

      <button class="close">Fechar</button>
    </div>
  </div>

  <main>
    <form class="search" autocomplete="off">
      <input type="search" name="search" placeholder="Procuper pelo nome do cliente ou carro" />
    </form>

    <button class="add">
      <img src="/assets/images/plus.svg" alt="">
      Adicionar novo serviço
    </button>

    <table>
      <thead>
        <tr>
          <th>
            <span>
              <img src="/assets/images/user.svg" alt="" />
              cliente
              <img src="/assets/images/arrow.svg" alt="" />
            </span>
          </th>
          <th>
            <span>
              <img src="/assets/images/car.svg" alt="">
              carro
              <img src="/assets/images/arrow.svg" alt="" />
            </span>
          </th>
          <th>
            <span>
              <img src="/assets/images/calendar.svg" alt="">
              ano
              <img src="/assets/images/arrow.svg" alt="" />
            </span>
          </th>
          <th>
            <span>
              <img src="/assets/images/car-model.svg" alt="">
              modelo
              <img src="/assets/images/arrow.svg" alt="" />
            </span>
          </th>
          <th>
            <span>
              <img src="/assets/images/tool.svg" alt="">
              serviço
            </span>
          </th>
          <th>
            <span>
              <img src="/assets/images/calendar.svg" alt="">
              data
              <img src="/assets/images/arrow.svg" alt="" />
            </span>
          </th>
        </tr>
      </thead>
      <tbody>
        {{line}}
      </tbody>
    </table>
  </main>

  <div class="menu">
    <a href="#">Marcar/desmarcar como concluído</a>
    <a href="#">Alterar dados</a>
    <a href="#">Apagar</a>
  </div>

  <script>
    const openForm = document.querySelector('button.add');
    const closeForm = document.querySelector('button.close');
    const overlay = document.querySelector('div.overlay');
    const items = document.querySelectorAll('tbody tr');
    const menu = document.querySelector('div.menu');
    const submitButton = document.querySelector('button.submitButton');
    const client = document.querySelector('form.client');
    const car = document.querySelector('form.car');
    const service = document.querySelector('form.service');

    const URL = window.location.href;

    window.addEventListener('click', function(e) {
      if(!e.target.classList.contains('menu')) {
        menu.style.display = 'none';
        if(trMarked) trMarked.removeAttribute('style');
      }
    });

    let trMarked = null;

    items.forEach((item) => {
      item.addEventListener('contextmenu', function(e) {
        e.preventDefault();

        if(trMarked) trMarked.removeAttribute('style');

        const x = e.pageX;
        const y = e.pageY;

        menu.style.top = y + 'px';
        menu.style.left = x + 'px';
        menu.style.display = 'grid';

        this.style.background = '#F0F0F0';

        trMarked = this;
      });

    });

    openForm.addEventListener('click', function() {
      overlay.classList.add('active');
      window.scrollTo(0, 0);
    });

    closeForm.addEventListener('click', function() {
      overlay.classList.remove('active');
    });

    client.contact.addEventListener('keyup', function(e) {

      if(e.key.match(/[^0-9]/) || this.value.length > 11) {
        this.value = this.value.substring(0, this.value.length - 1);
      }

      this.value = this.value
        .replace(/([\d]{2})([\d]{5})([\d]{4})/, '($1) $2-$3');
    });

    submitButton.addEventListener('click', async function() {
      const data = {};
      let error = 0;

      error = validate(client, ['client', 'contact']);
      error = validate(car, ['brand', 'model', 'plate']);

      data.client = client.client.value;
      data.contact = client.contact.value;

      data.brand = car.brand.value;
      data.model = car.model.value;
      data.year = car.year.value;
      data.plate = car.plate.value;
      data.problem = car.problem.value;

      data.change_parts = service.changes.value;
      data.price = service.price.value;

      await fetch(URL + 'create', {
        method: 'POST',
        body: JSON.stringify(data)
      })
    });

    function validate(form, fields) {
      let error = 0;

      fields.forEach((field) => {
        if(form[field].value === '') {
          form[field].classList.add('error');
          error++;
        } else {
          form[field].classList.remove('error');
        }
      });

      return error;
    }
  </script>
</body>
</html>
